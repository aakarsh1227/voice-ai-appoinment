<script src="https://cdn.jsdelivr.net/gh/vapi-ai/web-sdk@latest/dist/vapi-sdk.js"></script>
<script>
  // This is your PUBLIC KEY
  const vapi = new Vapi('608a8199-5983-4b0d-bea7-5d86465baab3');

  document.getElementById('callBtn').onclick = () => {
    // This is your ASSISTANT ID
    vapi.start('6b5356e0-d38c-4c85-b7b9-d224f8c760cc');
    
    document.getElementById('callBtn').innerText = "Connecting to Clinic...";
  };

  // Optional: Change button text back when call ends
  vapi.on('call-end', () => {
    document.getElementById('callBtn').innerText = "Start Voice Booking";
  });
</script>
